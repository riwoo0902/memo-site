<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Text Page</title>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
body{
    background:white;
    color:black;
    font-family: monospace;
    max-width:800px;
    margin:50px auto;
    line-height:1.6;
}
</style>

</head>
<body>

<div id="content"></div>

<script>
const markdownText = `
# 밀랍칠한 약간 녹슨 깍인 구리 반 블록

이 사이트는 **밀랍칠한 약간 녹슨 깎인 구리 반 블록**의 동아리 소개 사이트 입니다.



이름은 이상해도 동아리는 정상 입니다.ㅤ

심화반 수준의 교육을 해주는 동아리 입니다.


`;

document.getElementById("content").innerHTML = marked.parse(markdownText);
</script>

</body>
</html>
