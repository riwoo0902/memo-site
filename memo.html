<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Text Page</title>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
body{
    background:white;
    color:black;
    font-family: monospace;
    max-width:800px;
    margin:50px auto;
    line-height:1.6;
}
</style>

</head>
<body>

<div id="content"></div>

<script>
const markdownText = `
# 사이트 제목

이 사이트는 **글만 표시되는 사이트**입니다.

## 기능
- 마크다운 지원
- 이미지 없음
- 이모지 없음

### 코드 예시

\`\`\`csharp
Console.WriteLine("Hello World");
\`\`\`

끝.
`;

document.getElementById("content").innerHTML = marked.parse(markdownText);
</script>

</body>
</html>
